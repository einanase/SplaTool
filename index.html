<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイスプラ指南ツール</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #eaff3d;
            text-shadow: 0 0 10px rgba(234, 255, 61, 0.5);
            text-align: center;
        }

        .schedule-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .rule-card {
            background-color: #2a2a2a;
            border-radius: 10px;
            padding: 15px;
            width: 300px;
            border-top: 5px solid #f02d7d;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
        }

        .rule-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .stage-name {
            background-color: #333;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 4px solid #603bff;
        }

        /* 記録フォームのデザイン */
        .record-form {
            background-color: #222;
            border: 2px dashed #0cf2b4;
            padding: 20px;
            border-radius: 10px;
            margin: 30px auto;
            max-width: 800px;
            text-align: center;
        }

        .form-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        select,
        input[type="number"] {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px;
            border-radius: 5px;
            font-size: 1.1em;
        }

        .btn-win,
        .btn-lose {
            font-size: 1.5em;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-win {
            background-color: #ffaa00;
            color: #000;
        }

        .btn-win:hover {
            background-color: #ffcc00;
            transform: scale(1.05);
        }

        .btn-lose {
            background-color: #555;
            color: #fff;
        }

        .btn-lose:hover {
            background-color: #777;
            transform: scale(1.05);
        }

        /* 比較エリアのデザイン */
        .advice-container {
            margin-top: 40px;
            padding: 20px;
            background-color: #111;
            border: 2px solid #555;
            border-radius: 15px;
            text-align: center;
        }

        .advice-title {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .compare-box {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            align-items: stretch;
        }

        .compare-card {
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .winner-card {
            border: 3px solid #ffaa00;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.4);
            transform: scale(1.03);
            z-index: 10;
        }

        .loser-card {
            border: 1px solid #444;
            opacity: 0.7;
        }

        .winner-text {
            color: #ffaa00;
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .weapon-list {
            margin-top: 15px;
            text-align: left;
            font-size: 0.9em;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 8px;
            flex-grow: 1;
        }

        .weapon-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            border-bottom: 1px dashed #444;
            padding-bottom: 4px;
        }

        .weapon-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .high-win {
            color: #0cf2b4;
            font-weight: bold;
        }

        .low-win {
            color: #888;
        }

        .no-data {
            color: #555;
            font-style: italic;
        }

        .conclusion {
            margin-top: 30px;
            font-size: 1.3em;
            font-weight: bold;
            padding: 15px;
            background-color: #333;
            border-radius: 8px;
        }

        /* 履歴リストのデザイン */
        .history-container {
            margin-top: 40px;
            padding: 20px;
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 15px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .history-title {
            color: #fff;
            font-size: 1.3em;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .history-item {
            background-color: #2a2a2a;
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9em;
        }

        .history-win {
            border-left: 5px solid #ffaa00;
        }

        .history-lose {
            border-left: 5px solid #555;
        }

        .history-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .history-kd {
            font-weight: bold;
            font-size: 1.2em;
        }

        .history-date {
            color: #888;
            font-size: 0.8em;
        }

        .reset-btn {
            background: transparent;
            color: #888;
            border: 1px solid #888;
            padding: 5px 10px;
            margin-top: 30px;
            cursor: pointer;
            margin-bottom: 50px;
        }
    </style>
</head>

<body>
    <h1>🦑 リアルタイム指南ツール 🦑</h1>

    <div class="schedule-container" id="schedule">
        <p>スケジュールを読み込み中...</p>
    </div>

    <div class="record-form">
        <h2 style="color: #0cf2b4; margin-top:0;">📝 爆速・戦績メモ</h2>
        <div class="form-row">
            <select id="input-rule">
                <option value="バンカラ (チャレンジ)">バンカラ (チャレンジ)</option>
                <option value="バンカラ (オープン)">バンカラ (オープン)</option>
                <option value="Xマッチ">Xマッチ</option>
                <option value="ナワバリバトル">ナワバリバトル</option>
            </select>
            <select id="input-stage">
                <option value="">ステージ読み込み中...</option>
            </select>
            <select id="input-weapon">
                <option value="リッター4K">リッター4K</option>
                <option value="リッター4Kスコープ">リッター4Kスコープ</option>
                <option value="リッター4Kカスタム">リッター4Kカスタム</option>
                <option value="リッター4Kカスタムスコープ">リッター4Kカスタムスコープ</option>
                <option value="R-PEN/5H">R-PEN/5H</option>
                <option value="スプラチャージャースコープ">スプラチャージャースコープ</option>
                <option value="トライストリンガーコラボ">トライストリンガーコラボ</option>
                <option value="バレルスピナー">バレルスピナー</option>
                <option value="ホクサイ・ヒュー">ホクサイ・ヒュー</option>
                <option value="ダイナモローラー">ダイナモローラー</option>
            </select>
        </div>
        <div class="form-row">
            <input type="number" id="input-kill" placeholder="キル数 (K)" min="0" style="width: 100px;">
            <input type="number" id="input-death" placeholder="デス数 (D)" min="0" style="width: 100px;">
        </div>
        <div class="form-row" style="margin-top: 20px;">
            <button class="btn-win" onclick="saveRecord('win')">👑 WIN</button>
            <button class="btn-lose" onclick="saveRecord('lose')">💀 LOSE</button>
        </div>
        <div id="save-msg" style="color: #eaff3d; font-weight: bold; height: 20px;"></div>
    </div>

    <div class="advice-container" id="advice">
        <div class="advice-title">🧠 AI 分析中...</div>
    </div>

    <div class="history-container" id="history-box" style="display: none;">
        <div class="history-title">🕒 直近の戦績 (最新10件)</div>
        <div class="history-list" id="history-list">
        </div>
    </div>

    <div style="text-align: center;">
        <button class="reset-btn" onclick="resetData()">スマホのキャッシュを消去</button>
    </div>

    <script>
        const myWeapons = [
            'リッター4K', 'リッター4Kスコープ', 'リッター4Kカスタム', 'リッター4Kカスタムスコープ',
            'R-PEN/5H', 'スプラチャージャースコープ', 'トライストリンガーコラボ', 'バレルスピナー',
            'ホクサイ・ヒュー', 'ダイナモローラー'
        ];
        const STORAGE_KEY = 'spla_my_records';

        // 👇 いただいたURLを直接埋め込みました！ 👇
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwXBXAkhzPBi5ka_nphYoKqO-EO6xYPr3wEqP3OCP6OwPKnv7AU-YFkuogGAb1FbZOCYw/exec";

        let ruleStageMap = {};

        function saveRecord(result) {
            const rule = document.getElementById('input-rule').value;
            const stage = document.getElementById('input-stage').value;
            const weapon = document.getElementById('input-weapon').value;
            const kill = document.getElementById('input-kill').value;
            const death = document.getElementById('input-death').value;

            if (!kill || !death) {
                alert("キル数とデス数を入れてください！");
                return;
            }

            const recordData = {
                date: new Date().getTime(),
                rule: rule,
                stage: stage,
                weapon: weapon,
                kill: parseInt(kill),
                death: parseInt(death),
                result: result
            };

            // スマホの記憶を更新して即画面反映
            let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            records.push(recordData);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            renderAdvice();

            document.getElementById('save-msg').innerText = "⏳ スプレッドシートへ送信中...";

            // 裏でスプレッドシートに送信
            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(recordData)
            }).then(() => {
                document.getElementById('save-msg').innerText = "✅ 送信完了！";
                document.getElementById('input-kill').value = '';
                document.getElementById('input-death').value = '';
                setTimeout(() => { document.getElementById('save-msg').innerText = ""; }, 3000);
            });
        }

        async function loadDataFromSpreadsheet() {
            const adviceContainer = document.getElementById('advice');
            adviceContainer.innerHTML = `
                <div class="advice-title">🔄 データベースと同期中...</div>
                <p style="color:#ccc;">スプレッドシートから最新の戦績を読み込んでいます（数秒かかります）</p>
            `;

            try {
                const response = await fetch(GAS_URL);
                const dbRecords = await response.json();
                localStorage.setItem(STORAGE_KEY, JSON.stringify(dbRecords));
                renderAdvice();
            } catch (error) {
                console.error("データ同期エラー:", error);
                renderAdvice();
            }
        }

        function resetData() {
            if (confirm("スマホの記憶（キャッシュ）を消去しますか？\n※スプレッドシートのデータは消えません。")) {
                localStorage.removeItem(STORAGE_KEY);
                renderAdvice();
            }
        }

        function updateStageDropdown() {
            const selectedRule = document.getElementById('input-rule').value;
            const stageSelect = document.getElementById('input-stage');
            stageSelect.innerHTML = '';

            const stages = ruleStageMap[selectedRule] || [];
            if (stages.length > 0) {
                stages.forEach(s => {
                    stageSelect.innerHTML += `<option value="${s}">${s}</option>`;
                });
            } else {
                stageSelect.innerHTML = `<option value="">開催されていません</option>`;
            }
        }

        document.getElementById('input-rule').addEventListener('change', updateStageDropdown);

        async function fetchSchedule() {
            try {
                const [scheduleRes, localeRes] = await Promise.all([
                    fetch('https://splatoon3.ink/data/schedules.json'),
                    fetch('https://splatoon3.ink/data/locale/ja-JP.json')
                ]);

                const data = await scheduleRes.json();
                const locale = await localeRes.json();

                function getStageName(stage) { return locale.stages[stage.id]?.name || stage.name; }
                function getRuleName(rule) { return locale.rules[rule.id]?.name || rule.name; }

                const now = new Date().getTime();
                function getCurrent(nodes) {
                    return nodes.find(n => {
                        const start = new Date(n.startTime).getTime();
                        const end = new Date(n.endTime).getTime();
                        return start <= now && now < end;
                    }) || nodes[0];
                }

                const regularNode = getCurrent(data.data.regularSchedules.nodes);
                const bankaraNode = getCurrent(data.data.bankaraSchedules.nodes);
                const xMatchNode = getCurrent(data.data.xSchedules.nodes);
                const festNode = getCurrent(data.data.festSchedules.nodes);

                const container = document.getElementById('schedule');
                container.innerHTML = '';
                ruleStageMap = {};

                function createCard(title, ruleName, stage1Name, stage2Name, color) {
                    return `
                        <div class="rule-card" style="border-top-color: ${color}">
                            <div class="rule-name">${title} (${ruleName})</div>
                            <div class="stage-name">📍 ${stage1Name}</div>
                            <div class="stage-name">📍 ${stage2Name}</div>
                        </div>
                    `;
                }

                if (festNode && festNode.festMatchSetting) {
                    const setting = festNode.festMatchSetting;
                    container.innerHTML += createCard('🎉 フェスマッチ', getRuleName(setting.vsRule), getStageName(setting.vsStages[0]), getStageName(setting.vsStages[1]), '#ffd700');
                } else if (regularNode && regularNode.regularMatchSetting) {
                    const setting = regularNode.regularMatchSetting;
                    const s1 = getStageName(setting.vsStages[0]);
                    const s2 = getStageName(setting.vsStages[1]);
                    container.innerHTML += createCard('ナワバリバトル', 'レギュラー', s1, s2, '#eaff3d');
                    ruleStageMap['ナワバリバトル'] = [s1, s2];
                }

                if (bankaraNode && bankaraNode.bankaraMatchSettings) {
                    const bankaraOpen = bankaraNode.bankaraMatchSettings.find(s => s.bankaraMode === 'OPEN');
                    const bankaraChallenge = bankaraNode.bankaraMatchSettings.find(s => s.bankaraMode === 'CHALLENGE');
                    if (bankaraOpen) {
                        const s1 = getStageName(bankaraOpen.vsStages[0]);
                        const s2 = getStageName(bankaraOpen.vsStages[1]);
                        container.innerHTML += createCard('バンカラ (オープン)', getRuleName(bankaraOpen.vsRule), s1, s2, '#f02d7d');
                        ruleStageMap['バンカラ (オープン)'] = [s1, s2];
                    }
                    if (bankaraChallenge) {
                        const s1 = getStageName(bankaraChallenge.vsStages[0]);
                        const s2 = getStageName(bankaraChallenge.vsStages[1]);
                        container.innerHTML += createCard('バンカラ (チャレンジ)', getRuleName(bankaraChallenge.vsRule), s1, s2, '#f02d7d');
                        ruleStageMap['バンカラ (チャレンジ)'] = [s1, s2];
                    }
                }

                if (xMatchNode && xMatchNode.xMatchSetting) {
                    const setting = xMatchNode.xMatchSetting;
                    const s1 = getStageName(setting.vsStages[0]);
                    const s2 = getStageName(setting.vsStages[1]);
                    container.innerHTML += createCard('Xマッチ', getRuleName(setting.vsRule), s1, s2, '#0cf2b4');
                    ruleStageMap['Xマッチ'] = [s1, s2];
                }

                updateStageDropdown();

            } catch (error) {
                document.getElementById('schedule').innerHTML = `<p>エラーが発生しました: ${error.message}</p>`;
            }
        }

        function renderAdvice() {
            const adviceContainer = document.getElementById('advice');
            const historyBox = document.getElementById('history-box');
            const historyList = document.getElementById('history-list');

            let records = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

            function calcWinRates(ruleName) {
                const ruleRecords = records.filter(r => r.rule === ruleName);

                return myWeapons.map(weapon => {
                    const weaponRecords = ruleRecords.filter(r => r.weapon === weapon);
                    const totalMatches = weaponRecords.length;
                    const wins = weaponRecords.filter(r => r.result === 'win').length;

                    if (totalMatches === 0) {
                        return { name: weapon, rate: -1, text: 'データなし' };
                    }
                    const rate = Math.round((wins / totalMatches) * 100);
                    return { name: weapon, rate: rate, text: `${rate}% (${wins}勝/${totalMatches}戦)` };
                }).sort((a, b) => b.rate - a.rate);
            }

            const openData = calcWinRates('バンカラ (オープン)');
            const challengeData = calcWinRates('バンカラ (チャレンジ)');
            const xMatchData = calcWinRates('Xマッチ');

            let topOpen = openData[0].rate >= 0 ? openData[0].rate : -1;
            let topChallenge = challengeData[0].rate >= 0 ? challengeData[0].rate : -1;
            let topXMatch = xMatchData[0].rate >= 0 ? xMatchData[0].rate : -1;

            const maxWinRate = Math.max(topOpen, topChallenge, topXMatch);

            // データが1件もない時の処理
            if (maxWinRate === -1) {
                adviceContainer.innerHTML = `
                    <div class="advice-title">🧠 AI 分析スタンバイ中...</div>
                    <p style="color:#ccc;">まだ戦績データがありません。<br>上のフォームから1試合でも記録すると、ここに最強の分析結果が表示されます！</p>
                `;
                historyBox.style.display = 'none';
                return;
            }

            // 分析結果の表示
            const isOpenBest = maxWinRate === topOpen;
            const isChallengeBest = maxWinRate === topChallenge;
            const isXMatchBest = maxWinRate === topXMatch;

            let bestModeName = '';
            let bestModeColor = '';
            let bestWeaponName = '';

            if (isChallengeBest) {
                bestModeName = 'バンカラ (チャレンジ)';
                bestModeColor = '#f02d7d';
                bestWeaponName = challengeData[0].name;
            }
            else if (isXMatchBest) {
                bestModeName = 'Xマッチ';
                bestModeColor = '#0cf2b4';
                bestWeaponName = xMatchData[0].name;
            }
            else {
                bestModeName = 'バンカラ (オープン)';
                bestModeColor = '#f02d7d';
                bestWeaponName = openData[0].name;
            }

            // おすすめのルールとブキをフォームに自動セット
            const ruleSelect = document.getElementById('input-rule');
            const weaponSelect = document.getElementById('input-weapon');

            if (ruleSelect.value !== bestModeName) {
                ruleSelect.value = bestModeName;
                updateStageDropdown(); // ルールが変わったらステージの選択肢も連動させる
            }
            if (bestWeaponName) {
                weaponSelect.value = bestWeaponName;
            }

            function createWeaponListHtml(weaponData) {
                let html = '<div class="weapon-list">';
                weaponData.forEach(w => {
                    let colorClass = 'no-data';
                    if (w.rate >= 50) colorClass = 'high-win';
                    else if (w.rate >= 0) colorClass = 'low-win';

                    html += `
                        <div class="weapon-item ${colorClass}">
                            <span>${w.name}</span>
                            <span>${w.text}</span>
                        </div>
                    `;
                });
                html += '</div>';
                return html;
            }

            adviceContainer.innerHTML = `
                <div class="advice-title">📊 あなたの『本物』のデータ比較分析</div>
                
                <div class="compare-box">
                    <div class="compare-card ${isOpenBest ? 'winner-card' : 'loser-card'}">
                        ${isOpenBest ? '<div class="winner-text">👑 今はこちらがおすすめ！</div>' : ''}
                        <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 10px;">バンカラ (オープン)</div>
                        ${createWeaponListHtml(openData)}
                    </div>

                    <div class="compare-card ${isChallengeBest ? 'winner-card' : 'loser-card'}">
                        ${isChallengeBest ? '<div class="winner-text">👑 今はこちらがおすすめ！</div>' : ''}
                        <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 10px;">バンカラ (チャレンジ)</div>
                        ${createWeaponListHtml(challengeData)}
                    </div>

                    <div class="compare-card ${isXMatchBest ? 'winner-card' : 'loser-card'}">
                        ${isXMatchBest ? '<div class="winner-text">👑 今はこちらがおすすめ！</div>' : ''}
                        <div style="font-size: 1.2em; font-weight: bold; margin-bottom: 10px;">Xマッチ</div>
                        ${createWeaponListHtml(xMatchData)}
                    </div>
                </div>

                <div class="conclusion">
                    💡 結論：今の時間は <span style="color: ${bestModeColor}; font-size: 1.1em;">「${bestModeName}」</span> に潜るのが一番勝率が高いです！
                </div>
            `;

            // 直近10件の履歴リストを描画する
            historyBox.style.display = 'block';
            const sortedRecords = [...records].sort((a, b) => b.date - a.date);
            const recentRecords = sortedRecords.slice(0, 10);

            let historyHtml = '';
            recentRecords.forEach(r => {
                const isWin = r.result === 'win';
                const resultText = isWin ? '<span style="color:#ffaa00; font-weight:bold;">WIN</span>' : '<span style="color:#888; font-weight:bold;">LOSE</span>';
                const resultClass = isWin ? 'history-win' : 'history-lose';

                const d = new Date(r.date);
                const dateStr = `${d.getMonth() + 1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;

                historyHtml += `
                    <div class="history-item ${resultClass}">
                        <div class="history-info">
                            <div style="font-weight:bold; color:#0cf2b4;">${r.rule} / ${r.stage}</div>
                            <div>🔫 ${r.weapon}</div>
                            <div class="history-date">${dateStr}</div>
                        </div>
                        <div style="text-align: right;">
                            <div style="margin-bottom:5px;">${resultText}</div>
                            <div class="history-kd">${r.kill}k / ${r.death}d</div>
                        </div>
                    </div>
                `;
            });
            historyList.innerHTML = historyHtml;
        }

        fetchSchedule();
        loadDataFromSpreadsheet();
    </script>
</body>

</html>
